name: Deploy Edge Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy sync-instagram-comments
        run: |
          supabase functions deploy sync-instagram-comments \
            --project-ref hqpupwtddwcvakhhjvcq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy reply-instagram-comment
        run: |
          supabase functions deploy reply-instagram-comment \
            --project-ref hqpupwtddwcvakhhjvcq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
